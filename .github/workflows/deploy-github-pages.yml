name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set base path for project pages
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO" >> "$GITHUB_ENV"
          fi

      - name: Verify assets
        run: |
          test -d Bandori || (echo "Bandori folder missing" && exit 1)
          test -d web/public/assets || (echo "web/public/assets missing" && exit 1)
          echo "Bandori files: $(find Bandori -type f | wc -l)"
          echo "public/assets files: $(find web/public/assets -type f | wc -l)"

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build:static

      - name: Check output size
        working-directory: web
        run: |
          du -sh out
          find out -type f | wc -l

      - name: Ensure .nojekyll
        working-directory: web
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
